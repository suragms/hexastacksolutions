[build]
  command = "npm install && npx prisma generate && npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"
  external_node_modules = [
    "@prisma/client",
    ".prisma/client",
    "bcryptjs",
    "mongodb",
    "express",
    "cors",
    "jsonwebtoken",
    "multer",
    "serverless-http"
  ]
  included_files = ["prisma/schema.prisma"]

[[redirects]]
  from = "https://www.hexastacksolutions.com/*"
  to = "https://hexastacksolutions.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/united-states"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/solutions"
  to = "/services"
  status = 301
  force = true

[[redirects]]
  from = "/pricing"
  to = "/contact"
  status = 301
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
